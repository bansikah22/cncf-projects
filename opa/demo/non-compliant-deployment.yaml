# non-compliant-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    # The "app" label is missing, so this should be denied.
    owner: dev-team
spec:
  replicas: 1
  selector:
    matchLabels:
      owner: dev-team
  template:
    metadata:
      labels:
        owner: dev-team
    spec:
      containers:
      - name: my-container
        image: nginx:1.14.2
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"
