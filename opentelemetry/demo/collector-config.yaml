# collector-config.yaml
receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  # Exporter 1: Log to the console for debugging
  debug:
    verbosity: detailed

  # Exporter 2: Send to Jaeger via gRPC
  otlp_grpc:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

processors:
  batch:

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp_grpc]
