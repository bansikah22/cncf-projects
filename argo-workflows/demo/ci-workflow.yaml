apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: custom-ci-pipeline-
  namespace: argo
spec:
  entrypoint: ci-pipeline
  templates:
  - name: ci-pipeline
    dag:
      tasks:
      - name: build
        template: build-step
      - name: test
        dependencies: [build]
        template: test-step

  - name: build-step
    container:
      image: alpine:latest
      command: [sh, -c]
      args: ["echo '--- Custom Build Step ---'; sleep 5; echo 'Code built successfully!'"]

  - name: test-step
    container:
      image: alpine:latest
      command: [sh, -c]
      args: ["echo '--- Custom Test Step ---'; sleep 5; echo 'All tests passed!'"]
