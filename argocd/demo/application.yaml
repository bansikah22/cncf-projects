apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook
  namespace: argocd
spec:
  project: default
  source:
    # This is now pointing to a path within our repo instead of a remote git repo.
    # Argo CD will use the files from the local filesystem of the repo-server.
    repoURL: https://github.com/bansikah22/cncf-projects.git
    targetRevision: HEAD
    path: argocd/demo/guestbook-gitops/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
